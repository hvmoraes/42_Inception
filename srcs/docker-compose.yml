services:
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html  
    restart: always
    depends_on:
      wordpress:
        condition: service_healthy
    networks:
      - network

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: always
    env_file:
      - .env
    secrets:
      - mysql_root_password
      - wp_db_pass
    networks:
      - network

  wordpress:
    container_name: wordpress
    depends_on:
      mariadb:
        condition: service_healthy
    build: ./requirements/wordpress
    volumes:
      - wordpress_data:/var/www/html
    restart: always
    env_file:
      - .env
    secrets:
      - wp_db_pass
      - wp_admin_pass
    networks:
      - network

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  wp_db_pass:
    file: ./secrets/wp_db_pass.txt
  wp_admin_pass:
    file: ./secrets/wp_admin_pass.txt

volumes:
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      device: /home/hcorrea-/data/wordpress
      o: bind
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      device: /home/hcorrea-/data/mariadb
      o: bind

networks:
  network:
    driver: bridge