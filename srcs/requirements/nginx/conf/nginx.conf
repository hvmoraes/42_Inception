server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name hcorrea-.42.fr;

    # Log to stdout/stderr for Docker logs integration
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # SSL certificate and key
    ssl_certificate /etc/nginx/ssl/hcorrea-.crt;
    ssl_certificate_key /etc/nginx/ssl/hcorrea-.key;

    # Only use TLSv1.3 for encryption
    ssl_protocols TLSv1.3;

    # Extra SSL settings for better security
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Timeouts
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 65s;
    client_max_body_size 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    root /var/www/html;
    index index.php index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass wordpress:9000;
        fastcgi_read_timeout 60s;
    }
}